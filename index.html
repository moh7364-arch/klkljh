<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcademiaHub | تسجيل الدخول</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=El+Messiri:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
    
    <div class="auth-bg">
        <div class="auth-shape auth-shape-1"></div>
        <div class="auth-shape auth-shape-2"></div>
        <div class="auth-shape auth-shape-3"></div>
    </div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-icon">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <h1>Academia<span>Hub</span></h1>
                <p>المنصة الأكاديمية الشاملة</p>
            </div>

            <div class="auth-marquee">
                <div class="marquee-inner">
                    <span><i class="fa-solid fa-shield-halved"></i> ثقة</span>
                    <span>•</span>
                    <span><i class="fa-solid fa-handshake"></i> أمانة</span>
                    <span>•</span>
                    <span><i class="fa-solid fa-lock"></i> سرية</span>
                    <span>•</span>
                    <span><i class="fa-solid fa-rocket"></i> إنجاز</span>
                    <span>•</span>
                    <span><i class="fa-solid fa-bullseye"></i> دقة</span>
                    <span>•</span>
                    <span><i class="fa-solid fa-star"></i> جودة</span>
                    <span>•</span>
                    <span><i class="fa-solid fa-medal"></i> خبرة</span>
                    <span>•</span>
                    <span><i class="fa-solid fa-shield-halved"></i> ثقة</span>
                    <span>•</span>
                    <span><i class="fa-solid fa-handshake"></i> أمانة</span>
                </div>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">تسجيل الدخول</button>
                <button class="auth-tab" data-tab="register">حساب جديد</button>
            </div>

            <form class="auth-form active" id="loginForm">
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" placeholder="البريد الإلكتروني" required id="loginEmail">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="كلمة المرور" required id="loginPassword">
                </div>
                <button type="submit" class="auth-btn">
                    <span>دخول</span>
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
            </form>

            <form class="auth-form" id="registerForm">
                <div class="input-row">
                    <div class="input-group">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" placeholder="الاسم الأول" required id="regFirstName">
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" placeholder="الاسم الأخير" required id="regLastName">
                    </div>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" placeholder="البريد الإلكتروني" required id="regEmail">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-graduation-cap"></i>
                    <select required id="regLevel">
                        <option value="">المستوى الأكاديمي</option>
                        <option value="bachelor">بكالوريوس</option>
                        <option value="master">ماجستير</option>
                        <option value="phd">دكتوراه</option>
                        <option value="researcher">باحث</option>
                    </select>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-bookmark"></i>
                    <select required id="regSpecialization">
                        <option value="">التخصص العام</option>
                        <option value="medical">الطب والعلوم الصحية</option>
                        <option value="engineering">الهندسة</option>
                        <option value="science">العلوم الطبيعية</option>
                        <option value="social">العلوم الاجتماعية</option>
                        <option value="humanities">العلوم الإنسانية</option>
                        <option value="business">الإدارة والاقتصاد</option>
                        <option value="law">القانون</option>
                    </select>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="كلمة المرور (8 أحرف على الأقل)" required id="regPassword" minlength="8">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="تأكيد كلمة المرور" required id="regConfirm">
                </div>
                <button type="submit" class="auth-btn">
                    <span>إنشاء حساب</span>
                    <i class="fa-solid fa-user-plus"></i>
                </button>
            </form>

            <div class="auth-msg" id="authMsg"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
